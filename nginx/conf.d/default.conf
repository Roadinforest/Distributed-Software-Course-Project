# 用户服务后端
upstream user_backend {
    # round robin (default): keep as-is
    server user-service-1:8081;
    server user-service-2:8081;

    # Algorithm switch examples (enable one and comment others):
    # least_conn;
    # ip_hash;
}

# 商品服务后端
upstream product_backend {
    # round robin (default): keep as-is
    server product-service-1:8083;
    server product-service-2:8083;

    # Algorithm switch examples (enable one and comment others):
    # least_conn;
    # ip_hash;
}

# 订单服务后端
upstream order_backend {
    server order-service-1:8085;
    server order-service-2:8085;
}

# 库存服务后端
upstream stock_backend {
    server stock-service-1:8087;
    server stock-service-2:8087;
}

server {
    listen 80;
    server_name _;

    # 静态资源根目录
    root /usr/share/nginx/html;
    index index.html;

    # 静态文件目录 - 动静分离核心配置
    location /static/ {
        # 尝试查找文件，找不到返回404
        try_files $uri =404;

        # 缓存头设置 - 静态资源可以长期缓存
        expires 5m;
        add_header Cache-Control "public, max-age=300";

        # 开启gzip压缩
        gzip on;
        gzip_types text/plain text/css application/javascript;
    }

    # 前端首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 用户API代理
    location /api/v1/users/ {
        proxy_pass http://user_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 商品API代理
    location /api/v1/products/ {
        proxy_pass http://product_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 订单/秒杀API代理
    location /api/v1/seckill/ {
        proxy_pass http://order_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 支付API代理
    location /api/v1/payment/ {
        proxy_pass http://order_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 库存API代理
    location /api/v1/stock/ {
        proxy_pass http://stock_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 健康检查端点（用于负载均衡测试）
    location /healthz {
        proxy_pass http://user_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
