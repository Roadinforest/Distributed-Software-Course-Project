services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-net

  # MySQL 主库(商品) - 负责写操作
  mysql-master:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"
    command: [
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--server-id=1",
      "--log-bin=mysql-bin",
      "--binlog-format=ROW",
      "--gtid-mode=ON",
      "--enforce-gtid-consistency=ON"
    ]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql/setup-replication.sql:/docker-entrypoint-initdb.d/01-setup-replication.sql:ro
    networks:
      - app-net

  # MySQL 从库(商品) - 负责读操作
  mysql-slave:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: product_db
    ports:
      - "3309:3306"
    command: [
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--server-id=2",
      "--relay-log=relay-bin",
      "--log-slave-updates=1",
      "--read-only=1",
      "--gtid-mode=ON",
      "--enforce-gtid-consistency=ON"
    ]
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-slave-data:/var/lib/mysql
    networks:
      - app-net

  # MySQL 主从复制配置器
  mysql-replication-setup:
    image: mysql:8.0
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    volumes:
      - ./mysql/setup-slave.sh:/setup-slave.sh:ro
    command: ["sh", "-c", "sleep 15 && sh /setup-slave.sh"]
    networks:
      - app-net

  redis:
    image: redis:7.2
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - app-net

  # Zookeeper - Kafka依赖
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  # Kafka - 消息队列
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - app-net

  # 订单数据库
  mysql-order:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: order_db
    ports:
      - "3310:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-order-data:/var/lib/mysql
      - ./mysql/init-order.sql:/docker-entrypoint-initdb.d/init-order.sql:ro
    networks:
      - app-net

  user-service-1:
    build:
      context: ./user-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      USER_SVC_DATABASE_HOST: mysql
      USER_SVC_DATABASE_PORT: 3306
      USER_SVC_DATABASE_USER: root
      USER_SVC_DATABASE_PASSWORD: root123
      USER_SVC_DATABASE_DBNAME: user_db
      USER_SVC_REDIS_HOST: redis
      USER_SVC_REDIS_PORT: 6379
      INSTANCE_ID: user-service-1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  user-service-2:
    build:
      context: ./user-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      USER_SVC_DATABASE_HOST: mysql
      USER_SVC_DATABASE_PORT: 3306
      USER_SVC_DATABASE_USER: root
      USER_SVC_DATABASE_PASSWORD: root123
      USER_SVC_DATABASE_DBNAME: user_db
      USER_SVC_REDIS_HOST: redis
      USER_SVC_REDIS_PORT: 6379
      INSTANCE_ID: user-service-2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  # 商品服务1 - 读写分离模式
  product-service-1:
    build:
      context: ./product-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      # 写库(主库)
      PRODUCT_SVC_DATABASE_HOST: mysql-master
      PRODUCT_SVC_DATABASE_PORT: 3306
      PRODUCT_SVC_DATABASE_USER: root
      PRODUCT_SVC_DATABASE_PASSWORD: root123
      PRODUCT_SVC_DATABASE_DBNAME: product_db
      # 读库(从库)
      PRODUCT_SVC_DATABASE_READ_HOST: mysql-slave
      PRODUCT_SVC_DATABASE_READ_PORT: 3306
      PRODUCT_SVC_DATABASE_READ_USER: root
      PRODUCT_SVC_DATABASE_READ_PASSWORD: root123
      PRODUCT_SVC_DATABASE_READ_DBNAME: product_db
      # Redis
      PRODUCT_SVC_REDIS_HOST: redis
      PRODUCT_SVC_REDIS_PORT: 6379
      INSTANCE_ID: product-service-1
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  # 商品服务2 - 读写分离模式
  product-service-2:
    build:
      context: ./product-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      # 写库(主库)
      PRODUCT_SVC_DATABASE_HOST: mysql-master
      PRODUCT_SVC_DATABASE_PORT: 3306
      PRODUCT_SVC_DATABASE_USER: root
      PRODUCT_SVC_DATABASE_PASSWORD: root123
      PRODUCT_SVC_DATABASE_DBNAME: product_db
      # 读库(从库)
      PRODUCT_SVC_DATABASE_READ_HOST: mysql-slave
      PRODUCT_SVC_DATABASE_READ_PORT: 3306
      PRODUCT_SVC_DATABASE_READ_USER: root
      PRODUCT_SVC_DATABASE_READ_PASSWORD: root123
      PRODUCT_SVC_DATABASE_READ_DBNAME: product_db
      # Redis
      PRODUCT_SVC_REDIS_HOST: redis
      PRODUCT_SVC_REDIS_PORT: 6379
      INSTANCE_ID: product-service-2
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8084:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  # 订单服务1
  order-service-1:
    build:
      context: ./order-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      ORDER_SVC_DATABASE_HOST: mysql-order
      ORDER_SVC_DATABASE_PORT: 3306
      ORDER_SVC_DATABASE_USER: root
      ORDER_SVC_DATABASE_PASSWORD: root123
      ORDER_SVC_DATABASE_DBNAME: order_db
      ORDER_SVC_REDIS_HOST: redis
      ORDER_SVC_REDIS_PORT: 6379
      ORDER_SVC_KAFKA_BROKERS: kafka:9092
      INSTANCE_ID: order-service-1
    depends_on:
      mysql-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  # 订单服务2
  order-service-2:
    build:
      context: ./order-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      ORDER_SVC_DATABASE_HOST: mysql-order
      ORDER_SVC_DATABASE_PORT: 3306
      ORDER_SVC_DATABASE_USER: root
      ORDER_SVC_DATABASE_PASSWORD: root123
      ORDER_SVC_DATABASE_DBNAME: order_db
      ORDER_SVC_REDIS_HOST: redis
      ORDER_SVC_REDIS_PORT: 6379
      ORDER_SVC_KAFKA_BROKERS: kafka:9092
      INSTANCE_ID: order-service-2
    depends_on:
      mysql-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8086:8085"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      user-service-1:
        condition: service_healthy
      user-service-2:
        condition: service_healthy
      product-service-1:
        condition: service_healthy
      product-service-2:
        condition: service_healthy
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - app-net

volumes:
  mysql-data:
  mysql-master-data:
  mysql-slave-data:
  mysql-order-data:
  redis-data:

networks:
  app-net:
    driver: bridge
