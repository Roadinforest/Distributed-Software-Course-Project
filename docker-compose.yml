services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-net

  mysql-product:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-product-data:/var/lib/mysql
    networks:
      - app-net

  redis:
    image: redis:7.2
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - app-net

  user-service-1:
    build:
      context: ./user-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      USER_SVC_DATABASE_HOST: mysql
      USER_SVC_DATABASE_PORT: 3306
      USER_SVC_DATABASE_USER: root
      USER_SVC_DATABASE_PASSWORD: root123
      USER_SVC_DATABASE_DBNAME: user_db
      USER_SVC_REDIS_HOST: redis
      USER_SVC_REDIS_PORT: 6379
      INSTANCE_ID: user-service-1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  user-service-2:
    build:
      context: ./user-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      USER_SVC_DATABASE_HOST: mysql
      USER_SVC_DATABASE_PORT: 3306
      USER_SVC_DATABASE_USER: root
      USER_SVC_DATABASE_PASSWORD: root123
      USER_SVC_DATABASE_DBNAME: user_db
      USER_SVC_REDIS_HOST: redis
      USER_SVC_REDIS_PORT: 6379
      INSTANCE_ID: user-service-2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  product-service-1:
    build:
      context: ./product-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      PRODUCT_SVC_DATABASE_HOST: mysql-product
      PRODUCT_SVC_DATABASE_PORT: 3306
      PRODUCT_SVC_DATABASE_USER: root
      PRODUCT_SVC_DATABASE_PASSWORD: root123
      PRODUCT_SVC_DATABASE_DBNAME: product_db
      PRODUCT_SVC_REDIS_HOST: redis
      PRODUCT_SVC_REDIS_PORT: 6379
      INSTANCE_ID: product-service-1
    depends_on:
      mysql-product:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  product-service-2:
    build:
      context: ./product-service
      args:
        GOPROXY: https://goproxy.cn,direct
    restart: unless-stopped
    environment:
      PRODUCT_SVC_DATABASE_HOST: mysql-product
      PRODUCT_SVC_DATABASE_PORT: 3306
      PRODUCT_SVC_DATABASE_USER: root
      PRODUCT_SVC_DATABASE_PASSWORD: root123
      PRODUCT_SVC_DATABASE_DBNAME: product_db
      PRODUCT_SVC_REDIS_HOST: redis
      PRODUCT_SVC_REDIS_PORT: 6379
      INSTANCE_ID: product-service-2
    depends_on:
      mysql-product:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8084:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      user-service-1:
        condition: service_healthy
      user-service-2:
        condition: service_healthy
      product-service-1:
        condition: service_healthy
      product-service-2:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - app-net

volumes:
  mysql-data:
  mysql-product-data:
  redis-data:

networks:
  app-net:
    driver: bridge
